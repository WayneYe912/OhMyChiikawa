<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>OhMyChiikawa</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- the stage fills the transparent window; the pet lives in the layer stack -->
  <div id="stage">
    <div id="layer-move">
      <div id="layer-tilt">
        <div id="layer-breathe">
          <div id="pet-content"><!-- svg or img injected here --></div>
        </div>
      </div>
    </div>
    <!-- random/click speech bubble; lives outside the transform stack so it stays upright -->
    <div id="speech" class="speech" aria-hidden="true"><span class="speech-text"></span></div>
  </div>

  <!-- pet registry + bundled pets (each registers itself; fully offline) -->
  <script src="pets/registry.js"></script>
  <script src="pets/chiikawa.js"></script>
  <script src="pets/usagi.js"></script>
  <script src="pets/usagi-roll.js"></script>
  <script src="pets/hachiware.js"></script>

  <script src="renderer.js"></script>
</body>
</html>
